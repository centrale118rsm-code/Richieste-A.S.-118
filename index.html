<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <title>Richieste - 118 San Marino</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        :root {
            --primary: #2563eb; 
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sec: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #2563eb 100%);
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
            color: white; border-radius: 0 0 24px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .btn-back, .btn-icon {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 40px; height: 40px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px);
            text-decoration: none; transition: 0.2s;
        }
        .btn-back:active, .btn-icon:active { transform: scale(0.92); }
        .page-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }

        /* --- SEARCH BAR --- */
        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%; padding: 12px 16px 12px 44px; border-radius: 12px;
            border: none; background: rgba(255,255,255,0.2); color: white;
            font-size: 0.95rem; font-weight: 500; backdrop-filter: blur(5px);
        }
        .search-container input::placeholder { color: rgba(255,255,255,0.7); }
        .search-container input:focus { background: rgba(255,255,255,0.3); outline: none; }
        .search-container .material-icons-round { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.8); }

        /* --- MAIN CONTENT (LISTA) --- */
        main { padding: 10px 20px; flex: 1; overflow-y: auto; padding-bottom: 100px; }
        
        .section-title { font-size: 0.85rem; font-weight: 800; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .month-group { margin-bottom: 24px; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
        .month-header {
            background: #f1f5f9; padding: 12px 16px;
            font-size: 0.85rem; font-weight: 800; color: var(--text-sec);
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border);
        }
        
        .list-row {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            transition: background 0.2s; background-color: #ffffff;
        }
        .list-row:last-child { border-bottom: none; }
        
        @keyframes flashPending {
            0% { background-color: #ffffff; }
            50% { background-color: #fef9c3; }
            100% { background-color: #ffffff; }
        }
        .row-pending { animation: flashPending 2.5s infinite ease-in-out; }
        .row-confirmed { background-color: #dcfce7 !important; }
        .row-rejected { background-color: #fee2e2 !important; }

        .row-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .row-content { flex: 1; min-width: 0; }
        .row-title { font-weight: 800; font-size: 0.95rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-subtitle { font-size: 0.75rem; color: var(--text-sec); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-date { font-size: 0.8rem; font-weight: 700; color: var(--primary); text-align: right; white-space: nowrap; }
        .row-status { display: flex; gap: 4px; flex-direction: column; align-items: flex-end; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-green { background: #10b981; }
        .status-red { background: #ef4444; }
        .status-gray { background: #cbd5e1; }

        .row-obscured { opacity: 0.5; background: #f8fafc !important; animation: none; }
        .row-obscured .row-title { text-decoration: line-through; color: var(--text-sec); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sec); }
        .empty-state .material-icons-round { font-size: 48px; opacity: 0.5; margin-bottom: 10px; }

        /* --- FAB & MODAL --- */
        .fab {
            position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px;
            background: linear-gradient(135deg, #2563eb, #1e3a8a); color: white;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37,99,235,0.4); border: none; cursor: pointer; z-index: 90;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }
        .fab .material-icons-round { font-size: 32px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 2000; display: none; align-items: flex-end; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; }
        
        .modal-content {
            background: var(--bg-card); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0;
            padding: 24px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.2rem; font-weight: 900; }
        
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-sec); margin-bottom: 6px; text-transform: uppercase; }
        
        .form-control {
            width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
            font-size: 0.95rem; font-weight: 600; background: var(--bg); color: var(--text-main);
        }
        .form-control:focus { border-color: var(--primary); background: #fff; }
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .btn-submit {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: white; font-weight: 800; font-size: 1rem;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(37,99,235,0.3);
        }
        .btn-submit:active { transform: scale(0.97); }

        .detail-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { font-size: 0.75rem; color: var(--text-sec); font-weight: 700; text-transform: uppercase; }
        .detail-value { font-size: 1rem; font-weight: 600; color: var(--text-main); margin-top: 4px; }
        
        .admin-controls { background: #f1f5f9; padding: 16px; border-radius: 12px; margin-top: 20px; }
        .admin-controls h4 { font-size: 0.85rem; text-transform: uppercase; margin-bottom: 12px; color: var(--text-sec); }
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 600; font-size: 0.9rem; }
        .checkbox-wrapper input { width: 18px; height: 18px; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; color: white; }
        .btn-hide { background: #f59e0b; }
        .btn-delete { background: #ef4444; }
        .btn-restore { background: #10b981; }

        .bg-copertura { background: #e0e7ff; color: #4338ca; }
        .bg-ferie { background: #ffedd5; color: #c2410c; }
        .bg-ferie-prec { background: #ffedd5; color: #9a3412; }
        .bg-permesso-ore { background: #dcfce7; color: #15803d; }
        .bg-permesso { background: #bbf7d0; color: #166534; }
        .bg-cambio-rep { background: #fef3c7; color: #b45309; }
        .bg-cambio-turno { background: #fde68a; color: #92400e; }
        .bg-recupero { background: #f3e8ff; color: #7e22ce; }
        .bg-default { background: #f1f5f9; color: #475569; }

    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="header-left">
                <a href="area_autisti.html" class="btn-back"><span class="material-icons-round">arrow_back</span></a>
                <div class="page-title">Gestione Richieste</div>
            </div>
            <div class="header-right">
                <button class="btn-icon" onclick="window.toggleAdmin()" title="Accesso Admin" id="adminBtn">
                    <span class="material-icons-round" id="adminIcon">admin_panel_settings</span>
                </button>
                <button class="btn-icon" onclick="window.downloadJSON()" title="Scarica Backup JSON">
                    <span class="material-icons-round">download</span>
                </button>
            </div>
        </div>
        <div class="search-container">
            <span class="material-icons-round">search</span>
            <input type="text" id="searchInput" placeholder="Cerca per nome, tipo o nota..." onkeyup="window.renderRequests()">
        </div>
    </header>

    <main id="requests-container"></main>

    <button class="fab" onclick="window.openAddModal()">
        <span class="material-icons-round">add</span>
    </button>

    <div id="add-modal" class="modal-overlay" onclick="window.closeModal('add-modal', event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Nuova Richiesta</h3>
                <span class="material-icons-round" style="cursor:pointer; color:var(--text-sec)" onclick="window.closeModal('add-modal')">close</span>
            </div>
            
            <form id="requestForm" onsubmit="window.saveRequest(event)">
                <div class="form-group">
                    <label>Operatore</label>
                    <select id="reqName" class="form-control" required>
                        <option value="" disabled selected>Seleziona operatore...</option>
                        <option value="Barbieri">Barbieri</option>
                        <option value="Pazzaglia">Pazzaglia</option>
                        <option value="Bianchi">Bianchi</option>
                        <option value="Sarti">Sarti</option>
                        <option value="Ghiotti">Ghiotti</option>
                        <option value="Berardi">Berardi</option>
                        <option value="Michelotti">Michelotti</option>
                        <option value="Volpini">Volpini</option>
                        <option value="Fabbri">Fabbri</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Tipo di Richiesta</label>
                    <select id="reqType" class="form-control" required>
                        <option value="" disabled selected>Seleziona tipo...</option>
                        <option value="copertura_reperibilita">🛡 Copertura Reperibilità</option>
                        <option value="ferie">🏖 Ferie</option>
                        <option value="ferie_anno_prec">🏖 Ferie Anno Precedente</option>
                        <option value="permesso_ore">⏱ Permesso Ore</option>
                        <option value="permesso">⏱ Permesso</option>
                        <option value="cambio_reperibilita">🔄 Cambio Reperibilità</option>
                        <option value="cambio_turno">🔄 Cambio Turno</option>
                        <option value="recupero_ore">⏳ Recupero Ore</option>
                    </select>
                </div>

                <div class="form-group" id="swap-group" style="display:none; background:#f1f5f9; padding:12px; border-radius:12px; border:1px solid #e2e8f0;">
                    <label>Con chi fai il cambio?</label>
                    <select id="reqNameSwap" class="form-control">
                        <option value="" disabled selected>Seleziona operatore...</option>
                        <option value="Barbieri">Barbieri</option>
                        <option value="Pazzaglia">Pazzaglia</option>
                        <option value="Bianchi">Bianchi</option>
                        <option value="Sarti">Sarti</option>
                        <option value="Ghiotti">Ghiotti</option>
                        <option value="Berardi">Berardi</option>
                        <option value="Michelotti">Michelotti</option>
                        <option value="Volpini">Volpini</option>
                        <option value="Fabbri">Fabbri</option>
                    </select>
                </div>

                <div class="form-group" id="time-slot-group" style="display:none; background:#e0e7ff; padding:12px; border-radius:12px; border:1px solid #c7d2fe;">
                    <label style="color:#4338ca">Fascia di Reperibilità</label>
                    <select id="reqTimeSlot" class="form-control">
                        <option value="" disabled selected>Seleziona orario...</option>
                        <option value="13:00/20:00">13:00 - 20:00</option>
                        <option value="20:00/00:00">20:00 - 00:00</option>
                        <option value="00:00/07:00">00:00 - 07:00</option>
                        <option value="07:00/13:00">07:00 - 13:00</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label id="labelDateFrom">Dal Giorno</label>
                        <input type="date" id="reqDateFrom" class="form-control" required>
                    </div>
                    <div class="form-group" id="date-to-group">
                        <label>Al Giorno <span style="text-transform:none;font-weight:400;color:#94a3b8">(opzionale)</span></label>
                        <input type="date" id="reqDateTo" class="form-control">
                    </div>
                </div>

                <div class="form-group" id="days-group">
                    <label>Giorni effettivi di assenza</label>
                    <input type="number" step="0.5" id="reqDays" class="form-control" placeholder="Es. 1 o 0.5 (Default: 1)">
                </div>

                <div class="form-group">
                    <label>Note / Dettagli</label>
                    <textarea id="reqNotes" class="form-control" placeholder="Inserisci qui i dettagli della richiesta..."></textarea>
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit">INVIA RICHIESTA</button>
            </form>
        </div>
    </div>

    <div id="detail-modal" class="modal-overlay" onclick="window.closeModal('detail-modal', event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Dettaglio Richiesta</h3>
                <span class="material-icons-round" style="cursor:pointer; color:var(--text-sec)" onclick="window.closeModal('detail-modal')">close</span>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMX2ycf_6P3AcBvarVX4XNKbdposkuqgE",
            authDomain: "area-personale-autsocc-118-rsm.firebaseapp.com",
            projectId: "area-personale-autsocc-118-rsm",
            storageBucket: "area-personale-autsocc-118-rsm.firebasestorage.app",
            messagingSenderId: "910283994567",
            appId: "1:910283994567:web:d9c45b5f4b5a83b92595e2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.isAdmin = false;
        let requests = []; 

        const APPROVAL_TYPES = ['ferie', 'ferie_anno_prec', 'permesso_ore', 'permesso', 'recupero_ore'];

        const LABELS = { 
            "copertura_reperibilita": "Copertura Reperibilità",
            "ferie": "Ferie", "ferie_anno_prec": "Ferie Anno Prec.",
            "permesso_ore": "Permesso Ore", "permesso": "Permesso",
            "cambio_reperibilita": "Cambio Reperibilità", "cambio_turno": "Cambio Turno",
            "recupero_ore": "Recupero Ore"
        };
        const ICONS = { 
            "copertura_reperibilita": "shield", "ferie": "beach_access", "ferie_anno_prec": "history",
            "permesso_ore": "schedule", "permesso": "timer", "cambio_reperibilita": "swap_calls",
            "cambio_turno": "swap_horiz", "recupero_ore": "hourglass_empty"
        };
        const COLORS = {
            "copertura_reperibilita": "bg-copertura", "ferie": "bg-ferie", "ferie_anno_prec": "bg-ferie-prec",
            "permesso_ore": "bg-permesso-ore", "permesso": "bg-permesso", "cambio_reperibilita": "bg-cambio-rep",
            "cambio_turno": "bg-cambio-turno", "recupero_ore": "bg-recupero"
        };

        // GESTIONE VISIBILITÀ CAMPI MODULO
        document.getElementById('reqType').addEventListener('change', function(e) {
            const val = e.target.value;
            const swapGroup = document.getElementById('swap-group');
            const swapInput = document.getElementById('reqNameSwap');
            const timeSlotGroup = document.getElementById('time-slot-group');
            const timeSlotInput = document.getElementById('reqTimeSlot');
            const dateToGroup = document.getElementById('date-to-group');
            const daysGroup = document.getElementById('days-group');
            const labelDateFrom = document.getElementById('labelDateFrom');

            swapGroup.style.display = 'none'; swapInput.required = false;
            timeSlotGroup.style.display = 'none'; timeSlotInput.required = false;
            dateToGroup.style.display = 'block'; daysGroup.style.display = 'block';
            labelDateFrom.textContent = "Dal Giorno";

            if(val === 'cambio_turno' || val === 'cambio_reperibilita' || val === 'copertura_reperibilita') {
                swapGroup.style.display = 'block';
                swapInput.required = true;
            }

            if(val === 'copertura_reperibilita') {
                timeSlotGroup.style.display = 'block';
                timeSlotInput.required = true;
                dateToGroup.style.display = 'none';
                daysGroup.style.display = 'none';
                labelDateFrom.textContent = "Il Giorno (Data)";
            }
        });

        // ASCOLTATORE FIREBASE
        onSnapshot(query(collection(db, "richieste_turni"), orderBy("dateFrom", "desc")), (snapshot) => {
            requests = []; snapshot.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
            window.renderRequests();
        });

        // SALVATAGGIO
        window.saveRequest = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = "INVIO IN CORSO..."; btn.style.opacity = "0.7";
            
            const reqType = document.getElementById('reqType').value;
            const dFrom = document.getElementById('reqDateFrom').value;
            const dToRaw = document.getElementById('reqDateTo').value;
            
            const newReq = {
                timestamp: new Date().toISOString(),
                name: document.getElementById('reqName').value,
                type: reqType,
                swapWith: (swapGroup.style.display === 'block') ? document.getElementById('reqNameSwap').value : null,
                timeSlot: (reqType === 'copertura_reperibilita') ? document.getElementById('reqTimeSlot').value : null,
                dateFrom: dFrom,
                dateTo: (reqType === 'copertura_reperibilita' || !dToRaw) ? dFrom : dToRaw,
                effectiveDays: (reqType === 'copertura_reperibilita') ? "N/A" : (document.getElementById('reqDays').value || "1"),
                notes: document.getElementById('reqNotes').value.trim(),
                insertedInShifts: false,
                headNurseApproval: APPROVAL_TYPES.includes(reqType) ? 'attesa' : 'non_richiesta',
                obscured: false
            };

            try {
                await addDoc(collection(db, "richieste_turni"), newReq);
                document.getElementById('requestForm').reset();
                document.getElementById('reqType').dispatchEvent(new Event('change')); // reset visibility
                window.closeModal('add-modal');
                if(navigator.vibrate) navigator.vibrate(50);
            } catch (error) { alert("Errore durante l'invio."); } 
            finally { btn.textContent = "INVIA RICHIESTA"; btn.style.opacity = "1"; }
        };

        // ADMIN E AZIONI
        window.toggleAdmin = function() {
            if(window.isAdmin) {
                window.isAdmin = false;
                document.getElementById('adminIcon').style.color = "white";
                alert("Uscito dalla modalità Admin.");
            } else {
                const pwd = prompt("Inserisci la password per l'accesso Admin:");
                if(pwd === "000000") {
                    window.isAdmin = true;
                    document.getElementById('adminIcon').style.color = "#fde047";
                    alert("Accesso Admin effettuato.");
                } else if(pwd !== null) { alert("Password errata."); }
            }
            window.renderRequests();
        };

        window.deleteRequest = async function(id) {
            if(confirm("Vuoi eliminare definitivamente questa richiesta?")) {
                try { await deleteDoc(doc(db, "richieste_turni", id)); window.closeModal('detail-modal'); } 
                catch (error) { console.error(error); }
            }
        };

        window.obscureRequest = async function(id) {
            if(confirm("Vuoi ritirare/oscurare questa richiesta?")) {
                try { await updateDoc(doc(db, "richieste_turni", id), { obscured: true }); window.closeModal('detail-modal'); } 
                catch (error) { console.error(error); }
            }
        };

        window.restoreRequest = async function(id) {
            try { await updateDoc(doc(db, "richieste_turni", id), { obscured: false }); window.closeModal('detail-modal'); } 
            catch (error) { console.error(error); }
        };

        window.updateStatus = async function(id, field, value) {
            try { await updateDoc(doc(db, "richieste_turni", id), { [field]: value }); } 
            catch (error) { console.error(error); }
        };

        window.downloadJSON = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(requests, null, 2));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "richieste_118_backup_" + new Date().toISOString().slice(0,10) + ".json");
            document.body.appendChild(dl); dl.click(); dl.remove();
        };

        // RENDER LISTA
        window.renderRequests = function() {
            const container = document.getElementById('requests-container');
            const search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = "";

            const filtered = requests.filter(r => r.name.toLowerCase().includes(search) || LABELS[r.type].toLowerCase().includes(search));

            if(filtered.length === 0) {
                container.innerHTML = `<div class="empty-state"><span class="material-icons-round">list_alt</span><h3>Nessuna richiesta</h3></div>`; return;
            }

            const isPending = (r) => !r.obscured && ((APPROVAL_TYPES.includes(r.type) && r.headNurseApproval === 'attesa') || (!APPROVAL_TYPES.includes(r.type) && !r.insertedInShifts));
            const pendingRequests = filtered.filter(isPending).sort((a,b) => new Date(a.dateFrom) - new Date(b.dateFrom));
            const otherRequests = filtered.filter(r => !isPending(r));

            const generateRow = (r) => {
                const dFrom = new Date(r.dateFrom).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                const dTo = new Date(r.dateTo).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                const dateStr = dFrom === dTo ? dFrom : `${dFrom} - ${dTo}`;
                
                if(r.obscured) {
                    if(!window.isAdmin) return `<div class="list-row row-obscured"><div class="row-icon bg-default"><span class="material-icons-round">visibility_off</span></div><div class="row-content"><div class="row-title">Richiesta oscurata</div><div class="row-subtitle">Traccia mantenuta</div></div><div class="row-date">${dateStr}</div></div>`;
                }

                let rowClass = r.obscured ? "row-obscured" : "";
                if(!r.obscured) {
                    if(APPROVAL_TYPES.includes(r.type)) {
                        if(r.headNurseApproval === 'attesa') rowClass = "row-pending";
                        else if(r.headNurseApproval === 'si') rowClass = "row-confirmed";
                        else if(r.headNurseApproval === 'no') rowClass = "row-rejected";
                    } else if(r.insertedInShifts) { rowClass = "row-confirmed"; }
                }

                let statusHtml = '';
                if(r.insertedInShifts) statusHtml += `<div class="status-dot status-green" title="Inserita nei turni"></div>`;
                if(APPROVAL_TYPES.includes(r.type)) {
                    if(r.headNurseApproval === 'si') statusHtml += `<div class="status-dot status-green" title="Approvata"></div>`;
                    else if(r.headNurseApproval === 'no') statusHtml += `<div class="status-dot status-red" title="Rifiutata"></div>`;
                    else statusHtml += `<div class="status-dot status-gray" title="In attesa"></div>`;
                }

                let subTitle = r.type === 'copertura_reperibilita' ? `${LABELS[r.type]} ${r.timeSlot}` : `${LABELS[r.type]} • ${r.effectiveDays} gg`;
                if(r.swapWith) subTitle += ` (con ${r.swapWith})`;
                const adminTag = (r.obscured && window.isAdmin) ? `<span style="color:#ef4444;font-size:0.7rem">[OSCURATA]</span> ` : '';

                return `
                    <div class="list-row ${rowClass}" onclick="window.openDetailModal('${r.id}')">
                        <div class="row-icon ${COLORS[r.type] || "bg-default"}"><span class="material-icons-round" style="font-size:20px">${ICONS[r.type]}</span></div>
                        <div class="row-content"><div class="row-title">${adminTag}${r.name}</div><div class="row-subtitle">${subTitle}</div></div>
                        <div class="row-status"><div class="row-date">${dateStr}</div><div style="display:flex; gap:4px; margin-top:4px;">${statusHtml}</div></div>
                    </div>`;
            };

            if(pendingRequests.length > 0) {
                container.innerHTML += `<div class="section-title">In Attesa d'Azione</div><div class="month-group">${pendingRequests.map(generateRow).join('')}</div>`;
            }

            if(otherRequests.length > 0) {
                container.innerHTML += `<div class="section-title">Storico e Confermate</div>`;
                const groups = {};
                otherRequests.forEach(r => {
                    const m = new Date(r.dateFrom).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
                    const cap = m.charAt(0).toUpperCase() + m.slice(1);
                    if(!groups[cap]) groups[cap] = [];
                    groups[cap].push(r);
                });
                for (const [month, list] of Object.entries(groups)) {
                    container.innerHTML += `<div class="month-group"><div class="month-header"><span class="material-icons-round" style="font-size:18px">calendar_month</span> ${month}</div>${list.map(generateRow).join('')}</div>`;
                }
            }
        };

        // GESTIONE MODALI
        window.openAddModal = function() {
            document.getElementById('add-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('add-modal').classList.add('open'), 10);
        }

        window.openDetailModal = function(id) {
            const r = requests.find(x => x.id === id);
            if(!r || (r.obscured && !window.isAdmin)) return; // Se oscurata e non admin, non si apre il dettaglio

            let html = `<div class="detail-item"><div class="detail-label">Operatore</div><div class="detail-value">${r.name}</div></div>
                        <div class="detail-item"><div class="detail-label">Tipo Richiesta</div><div class="detail-value">${LABELS[r.type]}</div></div>`;

            if(r.swapWith) html += `<div class="detail-item"><div class="detail-label">Cambio/Copertura con</div><div class="detail-value" style="color:var(--primary)">${r.swapWith}</div></div>`;
            if(r.timeSlot) html += `<div class="detail-item"><div class="detail-label">Fascia Oraria</div><div class="detail-value">${r.timeSlot}</div></div>`;
            
            const dFrom = new Date(r.dateFrom).toLocaleDateString('it-IT');
            const dTo = new Date(r.dateTo).toLocaleDateString('it-IT');
            html += `<div class="detail-item"><div class="detail-label">Periodo</div><div class="detail-value">${r.type === 'copertura_reperibilita' || dFrom === dTo ? 'Il ' + dFrom : 'Dal ' + dFrom + ' al ' + dTo}</div></div>`;
            
            if(r.type !== 'copertura_reperibilita') html += `<div class="detail-item"><div class="detail-label">Giorni Effettivi</div><div class="detail-value">${r.effectiveDays}</div></div>`;
            
            html += `<div class="detail-item"><div class="detail-label">Note</div><div class="detail-value" style="font-weight:400">${r.notes || "-"}</div></div>
                     <div class="detail-item"><div class="detail-label">Data Inserimento</div><div class="detail-value" style="font-size:0.85rem;font-weight:400">${new Date(r.timestamp).toLocaleString('it-IT')}</div></div>`;

            html += `<div class="admin-controls"><h4>Gestione Turni</h4>
                        <label class="checkbox-wrapper"><input type="checkbox" ${r.insertedInShifts ? 'checked' : ''} onchange="window.updateStatus('${r.id}', 'insertedInShifts', this.checked)"> Inserita nei turni</label>`;
            
            if (APPROVAL_TYPES.includes(r.type)) {
                html += `<div style="margin-top: 10px;"><div class="detail-label" style="margin-bottom:6px">Approvazione Caposala</div>
                        <select class="form-control" onchange="window.updateStatus('${r.id}', 'headNurseApproval', this.value)">
                            <option value="attesa" ${r.headNurseApproval === 'attesa' ? 'selected' : ''}>In Attesa</option>
                            <option value="si" ${r.headNurseApproval === 'si' ? 'selected' : ''}>Sì, Approvato</option>
                            <option value="no" ${r.headNurseApproval === 'no' ? 'selected' : ''}>No, Rifiutato</option>
                        </select></div>`;
            }
            html += `</div>`;

            // Bottoni Azione (Oscura, Elimina, Ripristina)
            html += `<div class="action-buttons">`;
            if(r.obscured) {
                if(window.isAdmin) {
                    html += `<button class="btn-action btn-restore" onclick="window.restoreRequest('${r.id}')">Ripristina</button>`;
                    html += `<button class="btn-action btn-delete" onclick="window.deleteRequest('${r.id}')">Elimina</button>`;
                }
            } else {
                html += `<button class="btn-action btn-hide" onclick="window.obscureRequest('${r.id}')">Ritira / Oscura</button>`;
                if(window.isAdmin) html += `<button class="btn-action btn-delete" onclick="window.deleteRequest('${r.id}')">Elimina</button>`;
            }
            html += `</div>`;

            document.getElementById('detail-content').innerHTML = html;
            document.getElementById('detail-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('detail-modal').classList.add('open'), 10);
        }

        window.closeModal = function(id, e) {
            if (e && e.target !== e.currentTarget) return;
            const m = document.getElementById(id);
            m.classList.remove('open'); setTimeout(() => m.style.display = 'none', 300);
        }
    </script>
</body>
</html>
