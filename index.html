<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <title>Richieste - 118 San Marino</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        :root {
            --primary: #2563eb; 
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sec: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #2563eb 100%);
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
            color: white; border-radius: 0 0 24px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .btn-back {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 40px; height: 40px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px);
            text-decoration: none;
        }
        .btn-back:active { transform: scale(0.92); }
        .page-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }

        /* --- SEARCH BAR --- */
        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%; padding: 12px 16px 12px 44px; border-radius: 12px;
            border: none; background: rgba(255,255,255,0.2); color: white;
            font-size: 0.95rem; font-weight: 500; backdrop-filter: blur(5px);
        }
        .search-container input::placeholder { color: rgba(255,255,255,0.7); }
        .search-container input:focus { background: rgba(255,255,255,0.3); outline: none; }
        .search-container .material-icons-round { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.8); }

        /* --- MAIN CONTENT --- */
        main { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 100px; }
        
        .month-group { margin-bottom: 24px; }
        .month-header {
            font-size: 0.8rem; font-weight: 800; color: var(--text-sec);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        
        .request-card {
            background: var(--bg-card); border-radius: 16px; padding: 16px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            margin-bottom: 12px; position: relative; display: flex; flex-direction: column; gap: 8px;
        }
        .req-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .req-user { font-weight: 800; font-size: 1.05rem; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
        .req-date-target { font-size: 0.8rem; font-weight: 700; color: var(--primary); background: #dbeafe; padding: 4px 8px; border-radius: 8px; }
        
        .req-type-badge {
            display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem;
            font-weight: 700; padding: 4px 10px; border-radius: 20px; width: fit-content;
        }
        
        /* Colori per tipo richiesta */
        .type-cambio { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .type-ferie { background: #ffedd5; color: #c2410c; border: 1px solid #fed7aa; }
        .type-permesso { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .type-altro { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        .req-notes { font-size: 0.85rem; color: var(--text-sec); line-height: 1.4; background: var(--bg); padding: 10px; border-radius: 10px; }
        .req-timestamp { font-size: 0.65rem; color: #94a3b8; text-align: right; margin-top: 4px; font-weight: 500; }
        
        .btn-delete { position: absolute; bottom: 12px; left: 16px; color: #ef4444; background: none; border: none; font-size: 0.8rem; font-weight: 700; cursor: pointer; padding: 4px; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sec); }
        .empty-state .material-icons-round { font-size: 48px; opacity: 0.5; margin-bottom: 10px; }

        /* --- FAB & MODAL (Per aggiungere richieste) --- */
        .fab {
            position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px;
            background: linear-gradient(135deg, #2563eb, #1e3a8a); color: white;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37,99,235,0.4); border: none; cursor: pointer; z-index: 90;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }
        .fab .material-icons-round { font-size: 32px; }

        #add-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 2000; display: none; align-items: flex-end; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        #add-modal.open { opacity: 1; }
        .modal-content {
            background: var(--bg-card); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0;
            padding: 24px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
            max-height: 90vh; overflow-y: auto;
        }
        #add-modal.open .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.2rem; font-weight: 900; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-sec); margin-bottom: 6px; text-transform: uppercase; }
        .form-control {
            width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
            font-size: 0.95rem; font-weight: 600; background: var(--bg); color: var(--text-main);
        }
        .form-control:focus { border-color: var(--primary); background: #fff; }
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .btn-submit {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: white; font-weight: 800; font-size: 1rem;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(37,99,235,0.3);
        }
        .btn-submit:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <a href="area_autisti.html" class="btn-back"><span class="material-icons-round">arrow_back</span></a>
            <div class="page-title">Gestione Richieste</div>
        </div>
        <div class="search-container">
            <span class="material-icons-round">search</span>
            <input type="text" id="searchInput" placeholder="Cerca per nome, tipo o nota..." onkeyup="window.renderRequests()">
        </div>
    </header>

    <main id="requests-container">
        </main>

    <button class="fab" onclick="window.openModal()">
        <span class="material-icons-round">add</span>
    </button>

    <div id="add-modal" onclick="window.closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Nuova Richiesta</h3>
                <span class="material-icons-round" style="cursor:pointer; color:var(--text-sec)" onclick="window.closeModal()">close</span>
            </div>
            
            <form id="requestForm" onsubmit="window.saveRequest(event)">
                <div class="form-group">
                    <label>Operatore</label>
                    <input type="text" id="reqName" class="form-control" placeholder="Es. Rossi M." required>
                </div>
                
                <div class="form-group">
                    <label>Tipo di Richiesta</label>
                    <select id="reqType" class="form-control" required>
                        <option value="cambio">🔄 Cambio Turno</option>
                        <option value="ferie">🏖 Ferie</option>
                        <option value="permesso">⏱ Permesso</option>
                        <option value="altro">📋 Altro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Data Riferimento Turno</label>
                    <input type="date" id="reqDate" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Note / Dettagli</label>
                    <textarea id="reqNotes" class="form-control" placeholder="Es. Cambio con Bianchi per il turno di mattina..." required></textarea>
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit">INVIA RICHIESTA</button>
            </form>
        </div>
    </div>

    <script type="module">
        // Importa Firebase SDKs dal CDN (Versione 10)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // La tua configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAMX2ycf_6P3AcBvarVX4XNKbdposkuqgE",
            authDomain: "area-personale-autsocc-118-rsm.firebaseapp.com",
            projectId: "area-personale-autsocc-118-rsm",
            storageBucket: "area-personale-autsocc-118-rsm.firebasestorage.app",
            messagingSenderId: "910283994567",
            appId: "1:910283994567:web:d9c45b5f4b5a83b92595e2",
            measurementId: "G-9P8X82Y4H5"
        };

        // Inizializza Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let requests = []; // Array per i dati dal cloud

        const ICONS = { "cambio": "swap_horiz", "ferie": "beach_access", "permesso": "timer", "altro": "assignment" };
        const LABELS = { "cambio": "Cambio Turno", "ferie": "Ferie", "permesso": "Permesso", "altro": "Altro" };

        // 1. ASCOLTATORE IN TEMPO REALE DA FIREBASE
        // Questa funzione intercetta ogni modifica, aggiunta o rimozione dal database all'istante
        const q = query(collection(db, "richieste_turni"), orderBy("targetDate", "desc"));
        onSnapshot(q, (snapshot) => {
            requests = [];
            snapshot.forEach((doc) => {
                // Prende i dati e aggiunge l'ID univoco di Firebase
                requests.push({ id: doc.id, ...doc.data() });
            });
            window.renderRequests(); // Aggiorna la grafica
        });

        // 2. FUNZIONE PER SALVARE (Invia a Firebase)
        window.saveRequest = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = "INVIO IN CORSO...";
            btn.style.opacity = "0.7";
            
            const newReq = {
                timestamp: new Date().toISOString(),
                name: document.getElementById('reqName').value.trim(),
                type: document.getElementById('reqType').value,
                targetDate: document.getElementById('reqDate').value,
                notes: document.getElementById('reqNotes').value.trim()
            };

            try {
                // Aggiunge un nuovo documento nella collezione "richieste_turni"
                await addDoc(collection(db, "richieste_turni"), newReq);
                
                document.getElementById('requestForm').reset();
                window.closeModal();
                if(navigator.vibrate) navigator.vibrate(50);
            } catch (error) {
                console.error("Errore salvataggio: ", error);
                alert("Si è verificato un errore durante l'invio.");
            } finally {
                btn.textContent = "INVIA RICHIESTA";
                btn.style.opacity = "1";
            }
        };

        // 3. FUNZIONE PER ELIMINARE (Rimuove da Firebase)
        window.deleteRequest = async function(id) {
            if(confirm("Sei sicuro di voler eliminare questa richiesta?")) {
                try {
                    await deleteDoc(doc(db, "richieste_turni", id));
                    if(navigator.vibrate) navigator.vibrate([30, 30]);
                } catch (error) {
                    console.error("Errore eliminazione: ", error);
                }
            }
        };

        // 4. RENDERING GRAFICO
        window.renderRequests = function() {
            const container = document.getElementById('requests-container');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            container.innerHTML = "";

            const filtered = requests.filter(r => {
                return r.name.toLowerCase().includes(searchTerm) || 
                       r.notes.toLowerCase().includes(searchTerm) ||
                       LABELS[r.type].toLowerCase().includes(searchTerm);
            });

            if(filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="material-icons-round">inbox</span>
                        <h3>Nessuna richiesta</h3>
                        <p style="font-size:0.85rem; margin-top:5px;">Le richieste inserite compariranno qui.</p>
                    </div>`;
                return;
            }

            const groups = {};
            filtered.forEach(r => {
                const dateObj = new Date(r.targetDate);
                const monthName = dateObj.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
                const capitalizedMonth = monthName.charAt(0).toUpperCase() + monthName.slice(1);
                
                if(!groups[capitalizedMonth]) groups[capitalizedMonth] = [];
                groups[capitalizedMonth].push(r);
            });

            for (const [month, reqList] of Object.entries(groups)) {
                let monthHtml = `
                    <div class="month-group">
                        <div class="month-header">
                            <span class="material-icons-round" style="font-size:16px">calendar_month</span> ${month}
                        </div>
                `;

                reqList.forEach(r => {
                    const targetD = new Date(r.targetDate).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    const sentD = new Date(r.timestamp);
                    const sentStr = `Inviata il ${sentD.toLocaleDateString('it-IT')} alle ${sentD.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'})}`;

                    monthHtml += `
                        <div class="request-card">
                            <div class="req-header">
                                <div class="req-user"><span class="material-icons-round" style="font-size:18px;color:var(--primary)">person</span> ${r.name}</div>
                                <div class="req-date-target">${targetD}</div>
                            </div>
                            <div class="req-type-badge type-${r.type}">
                                <span class="material-icons-round" style="font-size:14px">${ICONS[r.type]}</span>
                                ${LABELS[r.type]}
                            </div>
                            <div class="req-notes">${r.notes}</div>
                            <div class="req-timestamp">${sentStr}</div>
                            <button class="btn-delete" onclick="window.deleteRequest('${r.id}')">Elimina</button>
                        </div>
                    `;
                });
                monthHtml += `</div>`;
                container.innerHTML += monthHtml;
            }
        }

        // 5. GESTIONE MODALE
        window.openModal = function() {
            if(navigator.vibrate) navigator.vibrate(20);
            const m = document.getElementById('add-modal');
            m.style.display = 'flex';
            document.getElementById('reqDate').min = new Date().toISOString().split("T")[0];
            setTimeout(() => m.classList.add('open'), 10);
        }

        window.closeModal = function(e) {
            if (e && e.target !== e.currentTarget) return;
            const m = document.getElementById('add-modal');
            m.classList.remove('open');
            setTimeout(() => m.style.display = 'none', 300);
        }
    </script>
</body>
</html>
